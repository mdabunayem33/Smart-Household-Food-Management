<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:16px;background:var(--gray-50);}
  .row{display:flex;gap:12px;height:100px;}
  .sw{flex:1;border-radius:var(--radius-md);display:flex;align-items:flex-end;padding:10px;font:var(--text-caption);color:var(--color-text-secondary);border:1px solid var(--color-border);}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--white)">White (bg)</div>
    <div class="sw" style="background:var(--gray-50)">Gray 50 (sections)</div>
    <div class="sw" style="background:var(--gray-100)">Gray 100</div>
    <div class="sw" style="background:var(--gray-200)">Gray 200 (border)</div>
    <div class="sw" style="background:var(--gray-400);color:#fff">Gray 400</div>
    <div class="sw" style="background:var(--gray-700);color:#fff">Gray 700 (text)</div>
    <div class="sw" style="background:var(--gray-900);color:#fff">Gray 900 (text primary)</div>
  </div>
</body></html>
