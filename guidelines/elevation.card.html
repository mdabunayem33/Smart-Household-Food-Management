<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;padding:24px;background:var(--color-bg-section);display:flex;gap:20px;}
.c{width:110px;height:110px;border-radius:var(--radius-lg);background:var(--color-bg-elevated);display:flex;align-items:flex-end;justify-content:center;padding-bottom:10px;font:var(--text-caption);color:var(--color-text-secondary);}
</style></head>
<body>
  <div class="c" style="box-shadow:var(--shadow-xs)">xs</div>
  <div class="c" style="box-shadow:var(--shadow-sm)">sm</div>
  <div class="c" style="box-shadow:var(--shadow-md)">md</div>
  <div class="c" style="box-shadow:var(--shadow-lg)">lg</div>
  <div class="c" style="box-shadow:var(--shadow-primary);background:var(--color-primary);color:#fff">primary glow</div>
</body></html>
