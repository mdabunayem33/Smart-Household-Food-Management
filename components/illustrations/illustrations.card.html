<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { padding: 20px; background: var(--color-bg); }
  .tile { width: 90px; height: 90px; border-radius: var(--radius-lg); background: var(--color-bg-section); box-shadow: var(--shadow-xs); display: flex; align-items: center; justify-content: center; padding: 14px; }
  .grid { display: flex; flex-wrap: wrap; gap: 14px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { FoodIllustration, FOOD_ILLUSTRATION_KEYS, OnboardingScene, ONBOARDING_SCENE_KEYS } = window.SmartHouseholdFoodManagementDesignSystem_8f59ea;
function Demo() {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
      <div className="grid">
        {FOOD_ILLUSTRATION_KEYS.map((k) => (
          <div key={k} className="tile"><FoodIllustration type={k} /></div>
        ))}
      </div>
      <div className="grid">
        {ONBOARDING_SCENE_KEYS.map((k) => (
          <div key={k} style={{ width: 160, height: 160, borderRadius: 'var(--radius-lg)', background: 'var(--color-bg-section)', boxShadow: 'var(--shadow-xs)' }}><OnboardingScene type={k} /></div>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
