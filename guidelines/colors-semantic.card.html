<!-- @dsCard group="Colors" viewport="700x150" name="Semantic Accents" subtitle="Orange, Red, Blue — status & info only" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:16px;background:var(--color-bg);}
  .row{display:flex;gap:12px;height:100px;}
  .sw{flex:1;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font:var(--text-caption);}
  .dark{color:#fff;}
  .light{color:var(--color-text-primary);}
</style></head>
<body>
  <div class="row">
    <div class="sw light" style="background:var(--orange-100)">Orange 100</div>
    <div class="sw dark" style="background:var(--orange-500)">Orange 500</div>
    <div class="sw light" style="background:var(--red-100)">Red 100</div>
    <div class="sw dark" style="background:var(--red-500)">Red 500</div>
    <div class="sw light" style="background:var(--blue-100)">Blue 100</div>
    <div class="sw dark" style="background:var(--blue-500)">Blue 500</div>
  </div>
</body></html>
