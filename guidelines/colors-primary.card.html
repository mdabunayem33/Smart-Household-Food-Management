<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:16px;background:var(--color-bg);}
  .row{display:flex;gap:12px;height:110px;}
  .sw{flex:1;border-radius:var(--radius-md);display:flex;align-items:flex-end;padding:10px;font:var(--text-caption);color:var(--color-text-inverse);}
  .light{color:var(--color-text-primary);}
</style></head>
<body>
  <div class="row">
    <div class="sw light" style="background:var(--green-50)">50</div>
    <div class="sw light" style="background:var(--green-100)">100</div>
    <div class="sw light" style="background:var(--green-200)">200</div>
    <div class="sw light" style="background:var(--green-300)">300</div>
    <div class="sw" style="background:var(--green-400)">400</div>
    <div class="sw" style="background:var(--green-500)">500</div>
    <div class="sw" style="background:var(--green-600)">600</div>
    <div class="sw" style="background:var(--green-700)">700</div>
    <div class="sw" style="background:var(--green-800)">800</div>
  </div>
</body></html>
