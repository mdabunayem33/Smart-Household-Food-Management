<!-- @dsCard group="Colors" viewport="700x180" name="Freshness Scale" subtitle="Fresh → Aging → Soon → Expired" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:16px;background:var(--color-bg);}
  .row{display:flex;gap:12px;}
  .card{flex:1;border-radius:var(--radius-lg);padding:16px;background:var(--color-bg-elevated);box-shadow:var(--shadow-sm);}
  .bar{height:8px;border-radius:var(--radius-pill);background:var(--gray-100);margin-top:10px;overflow:hidden;}
  .fill{height:100%;border-radius:var(--radius-pill);}
  .label{font:var(--text-label);font-family:var(--font-body);}
</style></head>
<body>
  <div class="row">
    <div class="card"><div class="label">Fresh</div><div class="bar"><div class="fill" style="width:100%;background:var(--color-fresh)"></div></div></div>
    <div class="card"><div class="label">Aging</div><div class="bar"><div class="fill" style="width:70%;background:var(--color-aging)"></div></div></div>
    <div class="card"><div class="label">Soon</div><div class="bar"><div class="fill" style="width:40%;background:var(--color-soon)"></div></div></div>
    <div class="card"><div class="label">Expired</div><div class="bar"><div class="fill" style="width:12%;background:var(--color-expired)"></div></div></div>
  </div>
</body></html>
